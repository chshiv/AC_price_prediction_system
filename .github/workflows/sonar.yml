name: SonarCloud Analysis


on:

 push:

  branches:

   - main


 pull_request:

  branches:

   - main



jobs:


 sonar:


  name: SonarCloud Scan


  runs-on: ubuntu-latest



  steps:


  - name: Checkout code

    uses: actions/checkout@v4



  - name: SonarCloud Scan

    uses: SonarSource/sonarqube-scan-action@v5

    env:

      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
